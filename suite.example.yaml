tests:
  - name: example-home
    url: https://example.com
    browser: chromium
    viewport: [1440, 900]
    wait_ms: 1000
    threshold_pct: 0.20
    pixel_threshold: 20
    min_region_area: 120
    ignore_regions: []

  - name: iana-domains
