tests:
  - name: demo-home-en
    url: http://127.0.0.1:8130/demo/index.html?lang=en-US
    browser: chromium
    viewport: [1440, 900]
    wait_ms: 400
    threshold_pct: 0.25
    pixel_threshold: 20
    min_region_area: 120
    locale: en-US
